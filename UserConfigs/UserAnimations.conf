animations {
    enabled = true
    
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    
    # 1. Define an ultra-smooth, linear-fluid acceleration curve
    bezier = borderFluid, 0.0, 0.0, 1.0, 1.0

    # 2. Assign the curve to your borders
    animation = border, 1, 15, borderFluid
    
    # FIXED: Increased speed to 150 for a calm, silky-smooth rotation loop
    animation = borderangle, 1, 150, borderFluid, loop 
    
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

