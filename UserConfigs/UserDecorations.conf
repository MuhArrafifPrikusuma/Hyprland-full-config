# Decoration Settings

# Hyprland Wiki Links
# Animation - https://wiki.hyprland.org/Configuring/Animations/
# Decoration - https://wiki.hyprland.org/Configuring/Variables/#decoration

# Sourcing colors generated by wallust
source = $HOME/.config/hypr/wallust/wallust-hyprland.conf

general {
  border_size = 1 
  gaps_in = 2 
  gaps_out = 3 

  # Smooth multi-color gradient using your neon blue theme palette
    
    col.active_border = rgb(00f0ff) rgb(007fff) rgb(002b5b) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
}

decoration {
  rounding = 4 
  
  active_opacity = 1.0
  inactive_opacity = 0.9
  fullscreen_opacity = 1.0
  dim_inactive = true
  dim_strength = 0.1
  dim_special = 0.8

  shadow {
    enabled = false 
    range = 2
    render_power = 1 

    color =  $color12
    color_inactive = $color10
  }

  blur {
    enabled = true
    size = 3
    passes = 2
    new_optimizations = true
    xray = false
    ignore_opacity = true
    special = true
    popups = true
  }
}
misc {
    disable_hyprland_logo = true
    always_follow_on_dnd = false
}
group {
  #  col.border_active = $color15

	groupbar {
		col.active = $color0
  }
}
